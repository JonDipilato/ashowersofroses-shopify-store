<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Shower of Roses — QR Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'EB Garamond', serif;
      background: #e8e2d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 1.5rem;
    }

    .hint {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      text-align: center;
    }

    /* ── Card ── */
    .card {
      width: 3.5in;
      min-height: 5.5in;
      background: linear-gradient(158deg, #fcf8f1 0%, #f4ede1 100%);
      border: 1.5px solid rgba(183,157,97,0.55);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 0.48in 0.38in 0.42in;
      box-shadow:
        0 2px 8px rgba(138,32,52,0.07),
        0 20px 56px rgba(138,32,52,0.13),
        inset 0 0 0 1px rgba(255,255,255,0.65);
      text-align: center;
      position: relative;
    }

    /* Corner brackets */
    .corner { position: absolute; width: 52px; height: 52px; border-color: rgba(183,157,97,0.4); border-style: solid; }
    .corner-tl { top: 13px; left: 13px; border-width: 1.5px 0 0 1.5px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 13px; right: 13px; border-width: 1.5px 1.5px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 13px; left: 13px; border-width: 0 0 1.5px 1.5px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 13px; right: 13px; border-width: 0 1.5px 1.5px 0; border-radius: 0 0 4px 0; }

    /* Top */
    .card-top { display: flex; flex-direction: column; align-items: center; gap: 0.42rem; }
    .kicker { font-size: 0.56rem; letter-spacing: 0.24em; text-transform: uppercase; color: #b79d61; }
    .store-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 700; color: #8a2034; line-height: 1.12; letter-spacing: 0.025em; }
    .rule { width: 2rem; height: 1px; background: linear-gradient(90deg, transparent, #b79d61, transparent); margin: 0.15rem 0; }

    /* QR */
    .qr-frame {
      background: #fdf9f3;
      border: 1.5px solid rgba(183,157,97,0.5);
      border-radius: 12px;
      padding: 13px;
      box-shadow: 0 4px 18px rgba(138,32,52,0.09), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    #qr-canvas { display: block; border-radius: 6px; }

    /* Middle */
    .card-middle { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .headline { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: #1a1210; line-height: 1.22; letter-spacing: 0.015em; }
    .subtext { font-size: 0.78rem; color: #7a6a5e; line-height: 1.6; max-width: 23ch; }

    /* Bottom */
    .card-bottom { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; }
    .ornament { font-size: 0.68rem; color: rgba(183,157,97,0.55); letter-spacing: 0.35em; }
    .url-line { font-size: 0.62rem; letter-spacing: 0.1em; color: #8a2034; font-family: 'EB Garamond', serif; }

    /* Print */
    @media print {
      body { background: white; padding: 0; display: block; min-height: unset; }
      .hint { display: none; }
      .card {
        margin: 0 auto;
        box-shadow: none;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

  <p class="hint">Open in browser with internet → Ctrl+P to print &nbsp;|&nbsp; 4×6 or Letter paper</p>

  <div class="card">
    <span class="corner corner-tl"></span>
    <span class="corner corner-tr"></span>
    <span class="corner corner-bl"></span>
    <span class="corner corner-br"></span>

    <div class="card-top">
      <p class="kicker">Handcrafted with devotion</p>
      <h1 class="store-name">A Shower<br>of Roses</h1>
      <div class="rule"></div>
    </div>

    <div class="qr-frame">
      <canvas id="qr-canvas" width="200" height="200"></canvas>
    </div>

    <div class="card-middle">
      <h2 class="headline">Join Our<br>Monthly Society</h2>
      <p class="subtext">Scan to receive handpicked sacramentals &amp; devotionals — curated personally by Patricia each month.</p>
    </div>

    <div class="card-bottom">
      <p class="ornament">✦ &nbsp; ✦ &nbsp; ✦</p>
      <p class="url-line">ashowersofroses-join.vercel.app</p>
    </div>
  </div>

  <!-- Tiny self-contained QR encoder, no external dependency -->
  <script>
  (function(){
    var URL = "https://ashowersofroses-join.vercel.app";

    // QR code generator (Reed-Solomon, pure JS, ~2 KB minified logic)
    // Source: nayuki.io QR Code generator library (MIT)
    var qrcodegen = (function() {
      function QrCode(version, errCorLvl, dataCodewords, mask) {
        this.version = version;
        this.errorCorrectionLevel = errCorLvl;
        this.size = version * 4 + 17;
        var c = this.size;
        this.modules = [];
        this.isFunction = [];
        for (var i = 0; i < c; i++) {
          this.modules.push(new Array(c).fill(false));
          this.isFunction.push(new Array(c).fill(false));
        }
        this.drawFunctionPatterns();
        var allCodewords = this.addEccAndInterleave(dataCodewords);
        this.drawCodewords(allCodewords);
        if (mask === -1) {
          var minPenalty = Infinity;
          for (var msk = 0; msk < 8; msk++) {
            this.applyMask(msk);
            this.drawFormatBits(msk);
            var penalty = this.getPenaltyScore();
            if (penalty < minPenalty) { minPenalty = penalty; mask = msk; }
            this.applyMask(msk);
          }
        }
        this.mask = mask;
        this.applyMask(mask);
        this.drawFormatBits(mask);
        this.isFunction = [];
      }

      QrCode.encodeText = function(text, ecl) {
        var segs = QrSegment.makeSegments(text);
        return QrCode.encodeSegments(segs, ecl);
      };

      QrCode.encodeSegments = function(segs, ecl, minVersion, maxVersion, mask, boostEcl) {
        if (minVersion === undefined) minVersion = 1;
        if (maxVersion === undefined) maxVersion = 40;
        if (mask === undefined) mask = -1;
        if (boostEcl === undefined) boostEcl = true;
        var version, dataUsedBits;
        for (version = minVersion; ; version++) {
          var dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
          dataUsedBits = QrSegment.getTotalBits(segs, version);
          if (dataUsedBits <= dataCapacityBits) break;
          if (version >= maxVersion) throw new RangeError("Data too long");
        }
        if (boostEcl) {
          [Ecc.MEDIUM, Ecc.QUARTILE, Ecc.HIGH].forEach(function(newEcl) {
            if (dataUsedBits <= QrCode.getNumDataCodewords(version, newEcl) * 8) ecl = newEcl;
          });
        }
        var bb = new BitBuffer();
        segs.forEach(function(seg) {
          bb.appendBits(seg.mode.modeBits, 4);
          bb.appendBits(seg.numChars, seg.mode.numCharCountBits(version));
          seg.getData().forEach(function(bit) { bb.appendBits(bit, 1); });
        });
        var dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
        bb.appendBits(0, Math.min(4, dataCapacityBits - bb.length));
        bb.appendBits(0, (8 - bb.length % 8) % 8);
        for (var padByte = 0xEC; bb.length < dataCapacityBits; padByte ^= 0xEC ^ 0x11)
          bb.appendBits(padByte, 8);
        var dataCodewords = [];
        while (dataCodewords.length * 8 < bb.length) dataCodewords.push(0);
        bb.getBits().forEach(function(bit, i) { dataCodewords[i >> 3] |= bit << (7 - (i & 7)); });
        return new QrCode(version, ecl, dataCodewords, mask);
      };

      QrCode.prototype.getModule = function(x, y) {
        return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x];
      };

      QrCode.prototype.drawFunctionPatterns = function() {
        var _this = this;
        for (var i = 0; i < this.size; i++) { this.setFunctionModule(6, i, i % 2 === 0); this.setFunctionModule(i, 6, i % 2 === 0); }
        this.drawFinderPattern(3, 3); this.drawFinderPattern(this.size - 4, 3); this.drawFinderPattern(3, this.size - 4);
        var alignPatPos = this.getAlignmentPatternPositions();
        var numAlign = alignPatPos.length;
        for (var ii = 0; ii < numAlign; ii++) for (var jj = 0; jj < numAlign; jj++) {
          if (!((ii === 0 && jj === 0) || (ii === 0 && jj === numAlign - 1) || (ii === numAlign - 1 && jj === 0)))
            this.drawAlignmentPattern(alignPatPos[ii], alignPatPos[jj]);
        }
        this.drawFormatBits(0);
        this.drawVersion();
      };

      QrCode.prototype.drawFormatBits = function(mask) {
        var data = this.errorCorrectionLevel.formatBits << 3 | mask;
        var rem = data;
        for (var i = 0; i < 10; i++) rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
        var bits = (data << 10 | rem) ^ 0x5412;
        for (var i = 0; i <= 5; i++) this.setFunctionModule(8, i, getBit(bits, i));
        this.setFunctionModule(8, 7, getBit(bits, 6));
        this.setFunctionModule(8, 8, getBit(bits, 7));
        this.setFunctionModule(7, 8, getBit(bits, 8));
        for (var i = 9; i < 15; i++) this.setFunctionModule(14 - i, 8, getBit(bits, i));
        for (var i = 0; i <= 7; i++) this.setFunctionModule(this.size - 1 - i, 8, getBit(bits, i));
        for (var i = 8; i < 15; i++) this.setFunctionModule(8, this.size - 15 + i, getBit(bits, i));
        this.setFunctionModule(8, this.size - 8, true);
      };

      QrCode.prototype.drawVersion = function() {
        if (this.version < 7) return;
        var rem = this.version;
        for (var i = 0; i < 12; i++) rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
        var bits = this.version << 12 | rem;
        for (var i = 0; i < 18; i++) {
          var a = this.size - 11 + i % 3, b = Math.floor(i / 3);
          this.setFunctionModule(a, b, getBit(bits, i));
          this.setFunctionModule(b, a, getBit(bits, i));
        }
      };

      QrCode.prototype.drawFinderPattern = function(x, y) {
        for (var dy = -4; dy <= 4; dy++) for (var dx = -4; dx <= 4; dx++) {
          var dist = Math.max(Math.abs(dx), Math.abs(dy));
          var xx = x + dx, yy = y + dy;
          if (0 <= xx && xx < this.size && 0 <= yy && yy < this.size)
            this.setFunctionModule(xx, yy, dist !== 2 && dist !== 4);
        }
      };

      QrCode.prototype.drawAlignmentPattern = function(x, y) {
        for (var dy = -2; dy <= 2; dy++) for (var dx = -2; dx <= 2; dx++)
          this.setFunctionModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
      };

      QrCode.prototype.setFunctionModule = function(x, y, isDark) {
        this.modules[y][x] = isDark; this.isFunction[y][x] = true;
      };

      QrCode.prototype.addEccAndInterleave = function(data) {
        var version = this.version, ecl = this.errorCorrectionLevel;
        var numBlocks = QrCode.NUM_ERROR_CORRECTION_BLOCKS[ecl.ordinal][version];
        var blockEccLen = QrCode.ECC_CODEWORDS_PER_BLOCK[ecl.ordinal][version];
        var rawCodewords = Math.floor(QrCode.getNumRawDataModules(version) / 8);
        var numShortBlocks = numBlocks - rawCodewords % numBlocks;
        var shortBlockLen = Math.floor(rawCodewords / numBlocks);
        var blocks = [], k = 0;
        var rsDiv = QrCode.reedSolomonComputeDivisor(blockEccLen);
        for (var i = 0; i < numBlocks; i++) {
          var datLen = shortBlockLen - blockEccLen + (i < numShortBlocks ? 0 : 1);
          var dat = data.slice(k, k + datLen); k += datLen;
          var ecc = QrCode.reedSolomonComputeRemainder(dat, rsDiv);
          if (i < numShortBlocks) dat.push(0);
          blocks.push(dat.concat(ecc));
        }
        var result = [];
        for (var ii = 0; ii < blocks[0].length; ii++)
          for (var jj = 0; jj < blocks.length; jj++)
            if (ii !== shortBlockLen - blockEccLen || jj >= numShortBlocks) result.push(blocks[jj][ii]);
        return result;
      };

      QrCode.prototype.drawCodewords = function(data) {
        var i = 0, size = this.size;
        for (var right = size - 1; right >= 1; right -= 2) {
          if (right === 6) right = 5;
          for (var vert = 0; vert < size; vert++) {
            for (var j = 0; j < 2; j++) {
              var x = right - j, upward = ((right + 1) & 2) === 0, y = upward ? size - 1 - vert : vert;
              if (!this.isFunction[y][x] && i < data.length * 8) {
                this.modules[y][x] = getBit(data[i >> 3], 7 - (i & 7)); i++;
              }
            }
          }
        }
      };

      QrCode.prototype.applyMask = function(mask) {
        for (var y = 0; y < this.size; y++) for (var x = 0; x < this.size; x++) {
          var invert;
          switch (mask) {
            case 0: invert = (x + y) % 2 === 0; break;
            case 1: invert = y % 2 === 0; break;
            case 2: invert = x % 3 === 0; break;
            case 3: invert = (x + y) % 3 === 0; break;
            case 4: invert = (Math.floor(x / 3) + Math.floor(y / 2)) % 2 === 0; break;
            case 5: invert = x * y % 2 + x * y % 3 === 0; break;
            case 6: invert = (x * y % 2 + x * y % 3) % 2 === 0; break;
            case 7: invert = ((x + y) % 2 + x * y % 3) % 2 === 0; break;
            default: throw new RangeError("No such mask");
          }
          if (!this.isFunction[y][x] && invert) this.modules[y][x] = !this.modules[y][x];
        }
      };

      QrCode.prototype.getPenaltyScore = function() {
        var result = 0, size = this.size;
        for (var y = 0; y < size; y++) {
          var runColor = false, runX = 0, runHistory = [0,0,0,0,0,0,0];
          for (var x = 0; x < size; x++) {
            if (this.modules[y][x] === runColor) {
              runX++;
              if (runX === 5) result += 3; else if (runX > 5) result++;
            } else { this.finderPenaltyAddHistory(runX, runHistory); if (!runColor) result += this.finderPenaltyCountPatterns(runHistory) * 40; runColor = this.modules[y][x]; runX = 1; }
          }
          result += this.finderPenaltyTerminateAndCount(runColor, runX, runHistory) * 40;
        }
        for (var x = 0; x < size; x++) {
          var runColor = false, runY = 0, runHistory = [0,0,0,0,0,0,0];
          for (var y = 0; y < size; y++) {
            if (this.modules[y][x] === runColor) {
              runY++;
              if (runY === 5) result += 3; else if (runY > 5) result++;
            } else { this.finderPenaltyAddHistory(runY, runHistory); if (!runColor) result += this.finderPenaltyCountPatterns(runHistory) * 40; runColor = this.modules[y][x]; runY = 1; }
          }
          result += this.finderPenaltyTerminateAndCount(runColor, runY, runHistory) * 40;
        }
        for (var y = 0; y < size - 1; y++) for (var x = 0; x < size - 1; x++) {
          var c = this.modules[y][x];
          if (c === this.modules[y][x+1] && c === this.modules[y+1][x] && c === this.modules[y+1][x+1]) result += 3;
        }
        var dark = 0;
        for (var y = 0; y < size; y++) for (var x = 0; x < size; x++) { if (this.modules[y][x]) dark++; }
        var total = size * size, k = Math.ceil(Math.abs(dark * 20 - total * 10) / total) - 1;
        result += k * 10;
        return result;
      };

      QrCode.prototype.getAlignmentPatternPositions = function() {
        var ver = this.version;
        if (ver === 1) return [];
        var numAlign = Math.floor(ver / 7) + 2, step = (ver === 32) ? 26 : Math.ceil((ver * 4 + 4) / (numAlign * 2 - 2)) * 2;
        var result = [6];
        for (var pos = this.size - 7; result.length < numAlign; pos -= step) result.splice(1, 0, pos);
        return result;
      };

      QrCode.prototype.finderPenaltyCountPatterns = function(runHistory) {
        var n = runHistory[1];
        var core = n > 0 && runHistory[2] === n && runHistory[3] === n * 3 && runHistory[4] === n && runHistory[5] === n;
        return (core && runHistory[0] >= n * 4 && runHistory[6] >= n ? 1 : 0) + (core && runHistory[6] >= n * 4 && runHistory[0] >= n ? 1 : 0);
      };

      QrCode.prototype.finderPenaltyTerminateAndCount = function(currentRunColor, currentRunLength, runHistory) {
        if (currentRunColor) { this.finderPenaltyAddHistory(currentRunLength, runHistory); currentRunLength = 0; }
        currentRunLength += this.size;
        this.finderPenaltyAddHistory(currentRunLength, runHistory);
        return this.finderPenaltyCountPatterns(runHistory);
      };

      QrCode.prototype.finderPenaltyAddHistory = function(currentRunLength, runHistory) {
        if (runHistory[0] === 0) currentRunLength += this.size;
        runHistory.pop(); runHistory.unshift(currentRunLength);
      };

      QrCode.getNumRawDataModules = function(ver) {
        var result = (16 * ver + 128) * ver + 64;
        if (ver >= 2) { var numAlign = Math.floor(ver / 7) + 2; result -= (25 * numAlign - 10) * numAlign - 55; if (ver >= 7) result -= 36; }
        return result;
      };

      QrCode.getNumDataCodewords = function(ver, ecl) {
        return Math.floor(QrCode.getNumRawDataModules(ver) / 8) - QrCode.ECC_CODEWORDS_PER_BLOCK[ecl.ordinal][ver] * QrCode.NUM_ERROR_CORRECTION_BLOCKS[ecl.ordinal][ver];
      };

      QrCode.reedSolomonComputeDivisor = function(degree) {
        if (degree < 1 || degree > 30) throw new RangeError("Degree out of range");
        var result = new Array(degree).fill(0); result[degree - 1] = 1;
        var root = 1;
        for (var i = 0; i < degree; i++) {
          for (var j = 0; j < result.length; j++) { result[j] = QrCode.reedSolomonMultiply(result[j], root); if (j + 1 < result.length) result[j] ^= result[j + 1]; }
          root = QrCode.reedSolomonMultiply(root, 0x02);
        }
        return result;
      };

      QrCode.reedSolomonComputeRemainder = function(data, divisor) {
        var result = new Array(divisor.length).fill(0);
        data.forEach(function(b) {
          var factor = b ^ result.shift(); result.push(0);
          divisor.forEach(function(coef, i) { result[i] ^= QrCode.reedSolomonMultiply(coef, factor); });
        });
        return result;
      };

      QrCode.reedSolomonMultiply = function(x, y) {
        var z = 0;
        for (var i = 7; i >= 0; i--) { z = (z << 1) ^ ((z >>> 7) * 0x11D); z ^= ((y >>> i) & 1) * x; }
        return z;
      };

      QrCode.ECC_CODEWORDS_PER_BLOCK = [
        [-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
        [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
        [-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
        [-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30]
      ];

      QrCode.NUM_ERROR_CORRECTION_BLOCKS = [
        [-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25],
        [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49],
        [-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68],
        [-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81]
      ];

      function getBit(x, i) { return ((x >>> i) & 1) !== 0; }

      /* Ecc */
      function Ecc(ordinal, formatBits) { this.ordinal = ordinal; this.formatBits = formatBits; }
      Ecc.LOW      = new Ecc(0, 1);
      Ecc.MEDIUM   = new Ecc(1, 0);
      Ecc.QUARTILE = new Ecc(2, 3);
      Ecc.HIGH     = new Ecc(3, 2);

      /* Mode */
      function Mode(modeBits, ccbits) { this.modeBits = modeBits; this._ccbits = ccbits; }
      Mode.prototype.numCharCountBits = function(ver) { return this._ccbits[Math.floor((ver + 7) / 17)]; };
      Mode.NUMERIC      = new Mode(0x1, [10, 12, 14]);
      Mode.ALPHANUMERIC = new Mode(0x2, [9, 11, 13]);
      Mode.BYTE         = new Mode(0x4, [8, 16, 16]);
      Mode.KANJI        = new Mode(0x8, [8, 10, 12]);
      Mode.ECI          = new Mode(0x7, [0,  0,  0]);

      /* BitBuffer */
      function BitBuffer() { this._bits = []; }
      BitBuffer.prototype = {
        get length() { return this._bits.length; },
        appendBits: function(val, len) { for (var i = len - 1; i >= 0; i--) this._bits.push((val >>> i) & 1); },
        getBits: function() { return this._bits.slice(); }
      };

      /* QrSegment */
      function QrSegment(mode, numChars, bitData) { this.mode = mode; this.numChars = numChars; this._bitData = bitData; }
      QrSegment.prototype.getData = function() { return this._bitData.slice(); };

      QrSegment.makeBytes = function(data) {
        var bb = new BitBuffer();
        data.forEach(function(b) { bb.appendBits(b, 8); });
        return new QrSegment(Mode.BYTE, data.length, bb.getBits());
      };

      QrSegment.makeSegments = function(text) {
        if (text === "") return [];
        var bytes = [];
        for (var i = 0; i < text.length; i++) {
          var c = text.charCodeAt(i);
          if (c < 0x80) { bytes.push(c); }
          else if (c < 0x800) { bytes.push(0xC0 | (c >> 6)); bytes.push(0x80 | (c & 0x3F)); }
          else { bytes.push(0xE0 | (c >> 12)); bytes.push(0x80 | ((c >> 6) & 0x3F)); bytes.push(0x80 | (c & 0x3F)); }
        }
        return [QrSegment.makeBytes(bytes)];
      };

      QrSegment.getTotalBits = function(segs, version) {
        return segs.reduce(function(a, seg) {
          var n = seg.mode.numCharCountBits(version);
          return (n > 31 || seg.numChars >= (1 << n)) ? Infinity : a + 4 + n + seg._bitData.length;
        }, 0);
      };

      return { QrCode: QrCode, Ecc: Ecc };
    })();

    // Draw to canvas
    try {
      var qr  = qrcodegen.QrCode.encodeText(URL, qrcodegen.Ecc.MEDIUM);
      var canvas = document.getElementById('qr-canvas');
      var size = qr.size, scale = Math.floor(200 / size), pad = Math.floor((200 - size * scale) / 2);
      canvas.width = canvas.height = 200;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FDF9F3';
      ctx.fillRect(0, 0, 200, 200);
      for (var y = 0; y < size; y++) for (var x = 0; x < size; x++) {
        ctx.fillStyle = qr.getModule(x, y) ? '#8A2034' : '#FDF9F3';
        ctx.fillRect(pad + x * scale, pad + y * scale, scale, scale);
      }
    } catch(e) {
      document.getElementById('qr-canvas').insertAdjacentHTML('afterend',
        '<p style="font-size:0.7rem;color:#8a2034;margin-top:0.5rem">ashowersofroses-join.vercel.app</p>');
    }
  })();
  </script>
